<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planet widget — demo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        min-height: 100vh;
        background: #05070d;
        color: #c7d0e0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      header {
        text-align: center;
      }
      header h1 {
        margin: 0 0 0.25rem;
        font-size: 1.1rem;
        font-weight: 600;
      }
      header p {
        margin: 0;
        font-size: 0.85rem;
        color: #6b7689;
      }
      /* Stage + controls sit side by side; they wrap to a column when narrow. */
      #app {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: center;
        gap: 1.25rem;
        padding: 0 1rem 2rem;
      }
      /* The widget is mounted into this element — it fills the stage box. */
      #stage {
        width: min(80vmin, 560px);
        height: min(80vmin, 560px);
        border: 1px solid #1c2436;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        flex: 0 0 auto;
      }
      /* Control panel, generated in demo.ts. */
      #controls {
        flex: 0 0 260px;
        max-height: min(80vmin, 560px);
        overflow-y: auto;
        padding: 0.25rem 0.75rem 0.75rem;
        border: 1px solid #1c2436;
        border-radius: 12px;
        background: #0a0e18;
        font-size: 0.8rem;
      }
      #controls fieldset {
        border: 0;
        border-top: 1px solid #1c2436;
        margin: 0;
        padding: 0.6rem 0 0.2rem;
      }
      #controls legend {
        padding: 0;
        font-weight: 600;
        color: #8b96ab;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-size: 0.68rem;
      }
      #controls .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        margin: 0.35rem 0;
      }
      #controls .row label {
        flex: 1 1 auto;
        color: #aab4c6;
      }
      #controls .row .val {
        flex: 0 0 2.6rem;
        text-align: right;
        color: #6b7689;
        font-variant-numeric: tabular-nums;
      }
      #controls input[type='range'] {
        flex: 0 0 6.5rem;
      }
      #controls input[type='color'] {
        flex: 0 0 1.75rem;
        width: 1.75rem;
        height: 1.5rem;
        padding: 0;
        border: 1px solid #1c2436;
        border-radius: 4px;
        background: none;
      }
      #controls button {
        margin-top: 0.8rem;
        width: 100%;
        padding: 0.4rem;
        border: 1px solid #1c2436;
        border-radius: 6px;
        background: #131a2a;
        color: #c7d0e0;
        font: inherit;
        cursor: pointer;
      }
      #controls button:hover {
        background: #1a2338;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>planet-widget</h1>
      <p>Demo — a lit sphere mounted into an HTML element</p>
    </header>
    <main id="app">
      <div id="stage"></div>
      <aside id="controls" aria-label="Widget controls"></aside>
    </main>
    <script type="module" src="/src/demo.ts"></script>
  </body>
</html>
