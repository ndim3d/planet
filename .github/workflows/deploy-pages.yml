name: Deploy demo to GitHub Pages

# Builds the demo app (`npm run build:demo` → dist-demo/) and publishes it to
# GitHub Pages. The demo's Vite build uses `base: './'` (relative asset URLs),
# so it works from a project subpath (https://<user>.github.io/<repo>/) with no
# repo-specific config.
#
# One-time setup: in the repo, Settings → Pages → Build and deployment →
# Source = "GitHub Actions".

on:
  # Publish on every push to the default branch.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-flight one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build demo
        run: npm run build:demo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
